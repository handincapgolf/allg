<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>allg — Malaysia Telco Coverage Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-dark: #0a0a0f;
    --bg-panel: #12121a;
    --bg-panel-hover: #1a1a26;
    --border: #2a2a3a;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555568;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.3);
    --maxis-green: #40c706;
    --maxis-blue: #0060ff;
    --maxis-pink: #ed138b;
    --celcom-blue: #66A2EA;
    --digi-yellow: #FFE000;
    --um-orange: #ff6b00;
    --um-pink: #E91E8C;
    --um-purple: #7B61B5;
    --unifi: #e4002b;
  }
  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-dark); color: var(--text-primary);
    height: 100vh; height: 100dvh; overflow: hidden;
  }
  #map { width: 100%; height: 100%; z-index: 1; }
  .leaflet-control-attribution {
    background: rgba(10,10,15,0.8) !important; color: var(--text-muted) !important;
    font-size: 10px !important; backdrop-filter: blur(8px);
  }
  .leaflet-control-attribution a { color: var(--text-secondary) !important; }
  .leaflet-control-zoom a {
    background: var(--bg-panel) !important; color: var(--text-primary) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--bg-panel-hover) !important; }

  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--maxis-green), var(--maxis-blue), var(--maxis-pink));
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 11px; color: #fff; letter-spacing: -0.5px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: var(--text-muted); font-weight: 400; font-size: 12px; margin-left: 6px; }

  .header-btns { display: flex; gap: 6px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-panel);
    color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--bg-panel-hover); color: var(--text-primary); }
  .icon-btn.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

  .panel {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
    background: rgba(18,18,26,0.92); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 12px; min-width: 340px; max-width: calc(100vw - 32px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-height: calc(100dvh - 80px); overflow-y: auto;
    transition: opacity 0.3s, transform 0.3s;
  }
  .panel.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(20px); }

  .panel-section { margin-bottom: 8px; }
  .panel-section:last-child { margin-bottom: 0; }
  .panel-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-muted); margin-bottom: 8px; padding: 0 4px;
  }
  .layer-toggles { display: flex; gap: 6px; }
  .layer-btn {
    flex: 1; padding: 10px 8px; border-radius: 10px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease; text-align: center; white-space: nowrap;
  }
  .layer-btn:hover { background: var(--bg-panel-hover); color: var(--text-primary); }
  .layer-btn.active {
    color: #fff; border-color: var(--layer-color);
    background: color-mix(in srgb, var(--layer-color) 18%, transparent);
    box-shadow: 0 0 16px color-mix(in srgb, var(--layer-color) 25%, transparent);
  }
  .layer-btn .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--layer-color); margin-right: 5px; vertical-align: middle;
    opacity: 0.5; transition: opacity 0.25s;
  }
  .layer-btn.active .dot { opacity: 1; box-shadow: 0 0 6px var(--layer-color); }
  .layer-btn.loading { pointer-events: none; opacity: 0.6; }
  .layer-btn.loading .dot { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .opacity-row { display: flex; align-items: center; gap: 10px; padding: 6px 4px 2px; }
  .opacity-label { font-size: 11px; color: var(--text-muted); min-width: 52px; }
  .opacity-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; background: var(--border); outline: none;
  }
  .opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--text-primary); cursor: pointer;
    border: 2px solid var(--bg-panel); box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .opacity-value { font-size: 11px; color: var(--text-secondary); min-width: 30px; text-align: right; font-variant-numeric: tabular-nums; }

  .coming-soon { display: flex; gap: 6px; flex-wrap: wrap; }
  .coming-soon-badge {
    padding: 6px 10px; border-radius: 8px; border: 1px dashed var(--border);
    font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
  }
  .coming-soon-badge .cs-dot { width: 6px; height: 6px; border-radius: 50%; opacity: 0.4; }

  /* Score panel */
  .score-panel {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1001;
    background: rgba(18,18,26,0.95); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; width: 360px; max-width: calc(100vw - 32px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transition: opacity 0.3s, transform 0.3s;
    max-height: calc(100dvh - 80px); overflow-y: auto;
  }
  .score-panel.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(20px); }

  .score-title {
    font-size: 14px; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .score-title svg { color: var(--accent); }
  .score-hint {
    font-size: 12px; color: var(--text-secondary); text-align: center;
    padding: 20px 0; line-height: 1.6;
  }
  .score-hint .emoji { font-size: 24px; display: block; margin-bottom: 6px; }
  .score-location {
    font-size: 11px; color: var(--text-secondary); margin-bottom: 10px;
    padding: 8px 10px; background: rgba(255,255,255,0.04); border-radius: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .score-location .coord { color: var(--text-primary); font-variant-numeric: tabular-nums; font-weight: 500; }

  .radius-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .radius-btn {
    flex: 1; padding: 8px 0; border-radius: 8px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .radius-btn:hover { background: var(--bg-panel-hover); color: var(--text-primary); }
  .radius-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(99,102,241,0.1); }

  .calc-btn {
    width: 100%; padding: 11px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .calc-btn:hover { box-shadow: 0 4px 16px var(--accent-glow); transform: translateY(-1px); }
  .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .score-results { margin-top: 14px; }
  .score-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .score-row:last-child { border-bottom: none; }
  .score-rank {
    width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .score-rank.gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
  .score-rank.silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
  .score-rank.bronze { background: linear-gradient(135deg, #c2853b, #a3703b); color: #fff; }
  .score-rank.other { background: var(--border); color: var(--text-muted); }
  .score-telco { font-size: 12px; font-weight: 600; min-width: 72px; }
  .score-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 4px; transition: width 0.8s ease-out; width: 0; }
  .score-pct { font-size: 12px; font-weight: 700; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }
  .score-note {
    font-size: 10px; color: var(--text-muted); margin-top: 10px; text-align: center; line-height: 1.5;
  }

  .score-mode-cursor { cursor: crosshair !important; }
  .score-mode-cursor .leaflet-interactive { cursor: crosshair !important; }

  .panel::-webkit-scrollbar, .score-panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track, .score-panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb, .score-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 480px) {
    .panel, .score-panel { bottom: 12px; border-radius: 14px; min-width: auto; width: calc(100vw - 24px); padding: 10px; }
    .layer-btn { padding: 8px 5px; font-size: 10px; }
    .layer-btn .dot { margin-right: 3px; width: 6px; height: 6px; }
    .logo-text span { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">all</div>
    <div class="logo-text">allg<span>MY Telco Coverage</span></div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="scoreToggle" title="Coverage Score">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
      </svg>
    </button>
    <button class="icon-btn" id="locateBtn" title="My Location">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<div id="map"></div>

<!-- Layer Panel -->
<div class="panel" id="layerPanel">
  <div class="panel-section">
    <div class="panel-label"><svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="3" fill="#00b0f0"/></svg>Maxis</div>
    <div class="layer-toggles">
      <button class="layer-btn" style="--layer-color: var(--maxis-green)" data-telco="maxis" data-gen="2g"><span class="dot"></span>2G</button>
      <button class="layer-btn active" style="--layer-color: var(--maxis-blue)" data-telco="maxis" data-gen="4g"><span class="dot"></span>4G</button>
      <button class="layer-btn" style="--layer-color: var(--maxis-pink)" data-telco="maxis" data-gen="5g"><span class="dot"></span>5G</button>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label"><svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="3" fill="#ed1c24"/></svg>CelcomDigi</div>
    <div class="layer-toggles">
      <button class="layer-btn" style="--layer-color: var(--celcom-blue)" data-telco="celcomdigi" data-gen="celcom_4g"><span class="dot"></span>Celcom 4G</button>
      <button class="layer-btn" style="--layer-color: var(--celcom-blue)" data-telco="celcomdigi" data-gen="digi_4g"><span class="dot"></span>Digi 4G</button>
      <button class="layer-btn" style="--layer-color: var(--digi-yellow)" data-telco="celcomdigi" data-gen="5g"><span class="dot"></span>5G</button>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label"><svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="3" fill="#ff6b00"/></svg>U Mobile</div>
    <div class="layer-toggles">
      <button class="layer-btn" style="--layer-color: var(--um-purple)" data-telco="umobile" data-gen="4g"><span class="dot"></span>4G</button>
      <button class="layer-btn" style="--layer-color: var(--um-pink)" data-telco="umobile" data-gen="5g"><span class="dot"></span>5G</button>
      <button class="layer-btn" style="--layer-color: var(--um-orange)" data-telco="umobile" data-gen="ultra5g"><span class="dot"></span>ULTRA5G</button>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Coming Soon</div>
    <div class="coming-soon">
      <div class="coming-soon-badge"><span class="cs-dot" style="background: var(--unifi)"></span>unifi</div>
      <div class="coming-soon-badge"><span class="cs-dot" style="background: #8dc63f"></span>Yes</div>
    </div>
  </div>
  <div class="panel-section">
    <div class="opacity-row">
      <span class="opacity-label">Opacity</span>
      <input type="range" class="opacity-slider" id="opacitySlider" min="10" max="100" value="70">
      <span class="opacity-value" id="opacityValue">70%</span>
    </div>
  </div>
</div>

<!-- Score Panel -->
<div class="score-panel hidden" id="scorePanel">
  <div class="score-title">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
    Coverage Score
  </div>
  <div id="scoreHint">
    <div class="score-hint">
      <span class="emoji">📍</span>
      Tap the map to select a location<br>
      <span style="font-size:11px;color:var(--text-muted)">or use the GPS button above</span>
    </div>
  </div>
  <div id="scoreConfig" style="display:none">
    <div class="score-location">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span class="coord" id="scoreLat">—</span>, <span class="coord" id="scoreLng">—</span>
    </div>
    <div class="panel-label" style="margin-bottom:6px">Radius</div>
    <div class="radius-row">
      <button class="radius-btn" data-km="10">10 km</button>
      <button class="radius-btn active" data-km="25">25 km</button>
      <button class="radius-btn" data-km="50">50 km</button>
    </div>
    <button class="calc-btn" id="calcBtn">Calculate Coverage</button>
    <div class="score-results" id="scoreResults" style="display:none"></div>
    <div class="score-note" id="scoreNote" style="display:none"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ============================================
// allg v1.6 — Coverage Map + Full Scoring
// Maxis via Worker proxy | CelcomDigi + U Mobile via pixel sampling
// ============================================

// ▼▼▼ CHANGE THIS to your Cloudflare Worker URL ▼▼▼
const WORKER_URL = 'https://allg-proxy.handincap-golf.workers.dev';
// ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲ ▲▲▲

const MAXIS_BASE = 'https://maxisnetwork.tuxgeo.com/gwc/service/gmaps';
const TILE_ZOOM = 10; // zoom level for Maxis tile sampling

const TELCO_LAYERS = {
  maxis: {
    '2g': { type: 'tile', url: `${MAXIS_BASE}?SRS=EPSG:900913&layers=maxis:coverage_2g&zoom={z}&x={x}&y={y}&format=image/png8`, label: 'Maxis 2G', color: '#40c706', tileLayer: 'coverage_2g' },
    '4g': { type: 'tile', url: `${MAXIS_BASE}?SRS=EPSG:900913&layers=maxis:coverage_4g&zoom={z}&x={x}&y={y}&format=image/png8`, label: 'Maxis 4G', color: '#0060ff', tileLayer: 'coverage_4g' },
    '5g': { type: 'tile', url: `${MAXIS_BASE}?SRS=EPSG:900913&layers=maxis:coverage_5g&zoom={z}&x={x}&y={y}&format=image/png8`, label: 'Maxis 5G', color: '#ed138b', tileLayer: 'coverage_5g' }
  },
  celcomdigi: {
    'celcom_4g': { type: 'overlay', url: 'data/celcom_4g.json', label: 'Celcom 4G', color: '#66A2EA' },
    'digi_4g':   { type: 'overlay', url: 'data/digi_4g.json',   label: 'Digi 4G',   color: '#66A2EA' },
    '5g':        { type: 'overlay', url: 'data/dnb_5g.json',    label: '5G (DNB)',   color: '#FFE000' }
  },
  umobile: {
    '4g':      { type: 'overlay', url: 'data/umobile_4g.json',      label: 'U Mobile 4G',      color: '#7B61B5' },
    '5g':      { type: 'overlay', url: 'data/umobile_5g.json',      label: 'U Mobile 5G',      color: '#E91E8C' },
    'ultra5g': { type: 'overlay', url: 'data/umobile_ultra5g.json', label: 'U Mobile ULTRA5G', color: '#ff6b00' }
  }
};

// Which layers to score (4G comparison)
const SCORE_LAYERS = [
  { telco: 'maxis',      gen: '4g',        label: 'Maxis',    color: '#0060ff' },
  { telco: 'celcomdigi', gen: 'celcom_4g', label: 'Celcom',   color: '#2196f3' },
  { telco: 'celcomdigi', gen: 'digi_4g',   label: 'Digi',     color: '#4caf50' },
  { telco: 'umobile',    gen: '4g',        label: 'U Mobile', color: '#7B61B5' },
];

// --- Map ---
const map = L.map('map', { center: [4.2105, 101.9758], zoom: 7 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// --- State ---
const activeLayers = {};
const dataCache = {};
let currentOpacity = 0.7;

function layerKey(t, g) { return `${t}-${g}`; }

async function toggleLayer(telco, gen, btn) {
  const key = layerKey(telco, gen);
  const config = TELCO_LAYERS[telco]?.[gen];
  if (!config) return false;

  if (activeLayers[key]) {
    map.removeLayer(activeLayers[key]);
    delete activeLayers[key];
    return false;
  }

  if (config.type === 'tile') {
    const layer = L.tileLayer(config.url, { opacity: currentOpacity, maxZoom: 18, minZoom: 1 });
    layer.addTo(map);
    activeLayers[key] = layer;
    return true;
  }

  if (config.type === 'overlay') {
    if (btn) btn.classList.add('loading');
    try {
      if (!dataCache[config.url]) {
        const resp = await fetch(config.url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        dataCache[config.url] = await resp.json();
      }
      const group = L.layerGroup();
      dataCache[config.url].overlays.forEach(o => {
        group.addLayer(L.imageOverlay(o.image, o.bounds, { opacity: currentOpacity }));
      });
      group.addTo(map);
      activeLayers[key] = group;
      return true;
    } catch (err) {
      console.error(`Failed to load ${config.label}:`, err);
      alert(`Failed to load ${config.label}:\n${err.message}`);
      return false;
    } finally {
      if (btn) btn.classList.remove('loading');
    }
  }
  return false;
}

document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (btn.classList.contains('loading')) return;
    const isActive = await toggleLayer(btn.dataset.telco, btn.dataset.gen, btn);
    btn.classList.toggle('active', isActive);
  });
});

// --- Opacity ---
const opacitySlider = document.getElementById('opacitySlider');
const opacityVal = document.getElementById('opacityValue');
opacitySlider.addEventListener('input', (e) => {
  currentOpacity = parseInt(e.target.value) / 100;
  opacityVal.textContent = `${e.target.value}%`;
  Object.values(activeLayers).forEach(layer => {
    if (layer.setOpacity) layer.setOpacity(currentOpacity);
    else if (layer.eachLayer) layer.eachLayer(l => { if (l.setOpacity) l.setOpacity(currentOpacity); });
  });
});

// --- Geolocation ---
const locateBtn = document.getElementById('locateBtn');
let locationMarker = null;
locateBtn.addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
  locateBtn.classList.add('active');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      map.setView([lat, lng], 13);
      if (locationMarker) map.removeLayer(locationMarker);
      locationMarker = L.circleMarker([lat, lng], {
        radius: 8, fillColor: '#6366f1', fillOpacity: 1, color: '#fff', weight: 2
      }).addTo(map).bindPopup('You are here').openPopup();
      setTimeout(() => locateBtn.classList.remove('active'), 1500);
      if (scoreMode) setScorePin(lat, lng);
    },
    (err) => { locateBtn.classList.remove('active'); alert('Location error: ' + err.message); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

// ============================================
// SCORING MODE
// ============================================
let scoreMode = false;
let scorePin = null;
let scoreCircle = null;
let scoreRadius = 25;
let scoreLat = null, scoreLng = null;

const scoreToggle = document.getElementById('scoreToggle');
const layerPanel = document.getElementById('layerPanel');
const scorePanel = document.getElementById('scorePanel');
const scoreHint = document.getElementById('scoreHint');
const scoreConfig = document.getElementById('scoreConfig');
const calcBtn = document.getElementById('calcBtn');
const scoreResults = document.getElementById('scoreResults');
const scoreNote = document.getElementById('scoreNote');

scoreToggle.addEventListener('click', () => {
  scoreMode = !scoreMode;
  scoreToggle.classList.toggle('active', scoreMode);
  if (scoreMode) {
    layerPanel.classList.add('hidden');
    scorePanel.classList.remove('hidden');
    map.getContainer().classList.add('score-mode-cursor');
  } else {
    layerPanel.classList.remove('hidden');
    scorePanel.classList.add('hidden');
    map.getContainer().classList.remove('score-mode-cursor');
    clearScorePin();
  }
});

map.on('click', (e) => {
  if (!scoreMode) return;
  setScorePin(e.latlng.lat, e.latlng.lng);
});

function setScorePin(lat, lng) {
  scoreLat = lat; scoreLng = lng;
  if (scorePin) map.removeLayer(scorePin);
  scorePin = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:24px;height:24px;background:#6366f1;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4);transform:translate(-12px,-12px)"></div>',
      iconSize: [0, 0]
    })
  }).addTo(map);

  document.getElementById('scoreLat').textContent = lat.toFixed(5);
  document.getElementById('scoreLng').textContent = lng.toFixed(5);
  scoreHint.style.display = 'none';
  scoreConfig.style.display = 'block';
  scoreResults.style.display = 'none';
  scoreNote.style.display = 'none';
  calcBtn.textContent = 'Calculate Coverage';
  drawCircle();
}

function clearScorePin() {
  if (scorePin) { map.removeLayer(scorePin); scorePin = null; }
  if (scoreCircle) { map.removeLayer(scoreCircle); scoreCircle = null; }
  scoreLat = null; scoreLng = null;
  scoreHint.style.display = 'block';
  scoreConfig.style.display = 'none';
}

function drawCircle() {
  if (scoreCircle) map.removeLayer(scoreCircle);
  if (!scoreLat) return;
  scoreCircle = L.circle([scoreLat, scoreLng], {
    radius: scoreRadius * 1000,
    color: '#6366f1', fillColor: '#6366f1', fillOpacity: 0.08,
    weight: 2, dashArray: '6,6'
  }).addTo(map);
}

document.querySelectorAll('.radius-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.radius-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    scoreRadius = parseInt(btn.dataset.km);
    drawCircle();
  });
});

// ============================================
// PIXEL SAMPLING ENGINE
// ============================================
const canvasCache = {};

async function loadOverlayData(url) {
  if (dataCache[url]) return dataCache[url];
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  dataCache[url] = await resp.json();
  return dataCache[url];
}

function imageToCanvas(src) {
  return new Promise((resolve) => {
    if (canvasCache[src]) { resolve(canvasCache[src]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);
      canvasCache[src] = { canvas: c, ctx };
      resolve(canvasCache[src]);
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function pixelHasCoverage(canvasObj, bounds, lat, lng) {
  const s = bounds[0][0], w = bounds[0][1], n = bounds[1][0], e = bounds[1][1];
  if (lat < s || lat > n || lng < w || lng > e) return false;
  const x = Math.floor((lng - w) / (e - w) * canvasObj.canvas.width);
  const y = Math.floor((n - lat) / (n - s) * canvasObj.canvas.height);
  if (x < 0 || x >= canvasObj.canvas.width || y < 0 || y >= canvasObj.canvas.height) return false;
  return canvasObj.ctx.getImageData(x, y, 1, 1).data[3] > 20;
}

function samplePoints(cLat, cLng, rKm, count) {
  const pts = [], R = 6371;
  for (let i = 0; i < count; i++) {
    const r = rKm * Math.sqrt(Math.random());
    const t = Math.random() * 2 * Math.PI;
    pts.push([
      cLat + (r * Math.cos(t)) / R * (180 / Math.PI),
      cLng + (r * Math.sin(t)) / (R * Math.cos(cLat * Math.PI / 180)) * (180 / Math.PI)
    ]);
  }
  return pts;
}

// Prepare overlay canvases
async function prepareOverlayCanvases(url) {
  const data = await loadOverlayData(url);
  const prepared = [];
  for (const o of data.overlays) {
    const co = await imageToCanvas(o.image);
    if (co) prepared.push({ ...co, bounds: o.bounds });
  }
  return prepared;
}

function checkPointOverlay(preparedOverlays, lat, lng) {
  for (const p of preparedOverlays) {
    if (pixelHasCoverage(p, p.bounds, lat, lng)) return true;
  }
  return false;
}

// ============================================
// MAXIS TILE SAMPLING
// ============================================

// lat/lng → tile coords + pixel within tile
function latLngToTilePixel(lat, lng, zoom) {
  const n = Math.pow(2, zoom);
  const xf = (lng + 180) / 360 * n;
  const latRad = lat * Math.PI / 180;
  const yf = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
  const tileX = Math.floor(xf);
  const tileY = Math.floor(yf);
  const px = Math.floor((xf - tileX) * 256);
  const py = Math.floor((yf - tileY) * 256);
  return { tileX, tileY, px, py };
}

// Fetch tile via Worker → canvas
const tileCanvasCache = {};

function fetchTileCanvas(tileLayer, z, x, y) {
  const key = `${tileLayer}/${z}/${x}/${y}`;
  if (tileCanvasCache[key]) return tileCanvasCache[key];

  const promise = new Promise((resolve) => {
    const url = `${WORKER_URL}/maxis/${tileLayer}/${z}/${x}/${y}`;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);
      resolve({ canvas: c, ctx });
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });

  tileCanvasCache[key] = promise;
  return promise;
}

// Score Maxis for all sample points
async function scoreMaxis(tileLayerName, points) {
  // Group points by tile
  const tileGroups = {};
  for (let i = 0; i < points.length; i++) {
    const [lat, lng] = points[i];
    const t = latLngToTilePixel(lat, lng, TILE_ZOOM);
    const tileKey = `${t.tileX}_${t.tileY}`;
    if (!tileGroups[tileKey]) {
      tileGroups[tileKey] = { tileX: t.tileX, tileY: t.tileY, pixels: [] };
    }
    tileGroups[tileKey].pixels.push({ px: t.px, py: t.py });
  }

  // Fetch all unique tiles in parallel
  const tileKeys = Object.keys(tileGroups);
  const tilePromises = tileKeys.map(k => {
    const g = tileGroups[k];
    return fetchTileCanvas(tileLayerName, TILE_ZOOM, g.tileX, g.tileY);
  });
  const tileResults = await Promise.all(tilePromises);

  // Check pixels
  let covered = 0;
  for (let i = 0; i < tileKeys.length; i++) {
    const co = tileResults[i];
    if (!co) continue;
    for (const { px, py } of tileGroups[tileKeys[i]].pixels) {
      if (px >= 0 && px < 256 && py >= 0 && py < 256) {
        const alpha = co.ctx.getImageData(px, py, 1, 1).data[3];
        if (alpha > 20) covered++;
      }
    }
  }

  return covered;
}

// --- Calculate ---
calcBtn.addEventListener('click', async () => {
  if (!scoreLat || !scoreLng) return;

  calcBtn.disabled = true;
  calcBtn.textContent = 'Loading data...';
  scoreResults.style.display = 'none';
  scoreNote.style.display = 'none';

  const NUM = 200;
  const points = samplePoints(scoreLat, scoreLng, scoreRadius, NUM);

  // Prepare overlay canvases
  const prepared = {};
  for (const sl of SCORE_LAYERS) {
    const config = TELCO_LAYERS[sl.telco]?.[sl.gen];
    if (config?.type === 'overlay') {
      if (!prepared[config.url]) {
        try { prepared[config.url] = await prepareOverlayCanvases(config.url); }
        catch { prepared[config.url] = []; }
      }
    }
  }

  calcBtn.textContent = 'Sampling...';
  await new Promise(r => setTimeout(r, 50));

  const results = [];
  let maxisFailed = false;

  for (const sl of SCORE_LAYERS) {
    const config = TELCO_LAYERS[sl.telco]?.[sl.gen];

    // Maxis — tile sampling via Worker
    if (config?.type === 'tile') {
      try {
        const covered = await scoreMaxis(config.tileLayer, points);
        results.push({ ...sl, score: Math.round(covered / NUM * 100) });
      } catch (err) {
        console.error('Maxis scoring failed:', err);
        results.push({ ...sl, score: -1 });
        maxisFailed = true;
      }
      continue;
    }

    // Overlay — pixel sampling
    const overlays = prepared[config.url] || [];
    let covered = 0;
    for (const [lat, lng] of points) {
      if (checkPointOverlay(overlays, lat, lng)) covered++;
    }
    results.push({ ...sl, score: Math.round(covered / NUM * 100) });
  }

  // Sort
  results.sort((a, b) => b.score - a.score);

  // Render
  let html = '', rank = 0;
  for (const r of results) {
    rank++;
    const rc = r.score < 0 ? 'other' : rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'other';
    html += `<div class="score-row">
      <div class="score-rank ${rc}">${r.score < 0 ? '?' : rank}</div>
      <div class="score-telco" style="color:${r.color}">${r.label}</div>
      <div class="score-bar-wrap"><div class="score-bar" data-pct="${r.score < 0 ? 0 : r.score}" style="background:${r.color}"></div></div>
      <div class="score-pct">${r.score < 0 ? '—' : r.score + '%'}</div>
    </div>`;
  }
  scoreResults.innerHTML = html;
  scoreResults.style.display = 'block';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      scoreResults.querySelectorAll('.score-bar').forEach(b => {
        b.style.width = b.dataset.pct + '%';
      });
    });
  });

  let note = `${NUM} samples · ${scoreRadius}km radius`;
  if (maxisFailed) note += '<br>⚠ Maxis Worker proxy error';
  scoreNote.innerHTML = note;
  scoreNote.style.display = 'block';

  calcBtn.disabled = false;
  calcBtn.textContent = 'Recalculate';
});

// --- Init ---
toggleLayer('maxis', '4g', null);
</script>
