<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>allg — Malaysia Telco Coverage Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

<style>
  /* ========== Reset & Base ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0a0a0f;
    --bg-panel: #12121a;
    --bg-panel-hover: #1a1a26;
    --border: #2a2a3a;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555568;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.3);

    /* Telco brand colors */
    --maxis-green: #40c706;
    --maxis-blue: #0060ff;
    --maxis-pink: #ed138b;
    --celcom-blue: #66A2EA;
    --digi-yellow: #FFE000;
    /* Future telcos */
    --umobile: #ff6b00;
    --unifi: #e4002b;
  }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ========== Map Container ========== */
  #map {
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* Dark map tiles override */
  .leaflet-tile-pane { filter: none; }
  .leaflet-control-attribution {
    background: rgba(10, 10, 15, 0.8) !important;
    color: var(--text-muted) !important;
    font-size: 10px !important;
    backdrop-filter: blur(8px);
  }
  .leaflet-control-attribution a { color: var(--text-secondary) !important; }
  .leaflet-control-zoom a {
    background: var(--bg-panel) !important;
    color: var(--text-primary) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--bg-panel-hover) !important;
  }

  /* ========== Header Bar ========== */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--maxis-green), var(--maxis-blue), var(--maxis-pink));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 11px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--text-muted);
    font-weight: 400;
    font-size: 12px;
    margin-left: 6px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .locate-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .locate-btn:hover {
    background: var(--bg-panel-hover);
    color: var(--text-primary);
  }
  .locate-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ========== Layer Control Panel ========== */
  .panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(18, 18, 26, 0.92);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
    min-width: 340px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  .panel-section {
    margin-bottom: 8px;
  }
  .panel-section:last-child { margin-bottom: 0; }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .layer-toggles {
    display: flex;
    gap: 6px;
  }

  .layer-btn {
    flex: 1;
    position: relative;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    white-space: nowrap;
  }

  .layer-btn:hover {
    background: var(--bg-panel-hover);
    color: var(--text-primary);
  }

  .layer-btn.active {
    color: #fff;
    border-color: var(--layer-color);
    background: color-mix(in srgb, var(--layer-color) 18%, transparent);
    box-shadow: 0 0 16px color-mix(in srgb, var(--layer-color) 25%, transparent);
  }

  .layer-btn .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--layer-color);
    margin-right: 6px;
    vertical-align: middle;
    opacity: 0.5;
    transition: opacity 0.25s;
  }

  .layer-btn.active .dot {
    opacity: 1;
    box-shadow: 0 0 6px var(--layer-color);
  }

  /* Loading state */
  .layer-btn.loading {
    pointer-events: none;
    opacity: 0.6;
  }
  .layer-btn.loading .dot {
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* Opacity slider */
  .opacity-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px 2px;
  }

  .opacity-label {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 52px;
  }

  .opacity-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }

  .opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--text-primary);
    cursor: pointer;
    border: 2px solid var(--bg-panel);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .opacity-value {
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 30px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ========== Coming Soon ========== */
  .coming-soon {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .coming-soon-badge {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px dashed var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .coming-soon-badge .cs-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0.4;
  }

  /* ========== Responsive ========== */
  @media (max-width: 480px) {
    .panel {
      bottom: 12px;
      border-radius: 14px;
      min-width: auto;
      width: calc(100vw - 24px);
      padding: 10px;
    }
    .layer-btn {
      padding: 8px 6px;
      font-size: 11px;
    }
    .layer-btn .dot { margin-right: 4px; }
    .logo-text span { display: none; }
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">all</div>
    <div class="logo-text">
      allg
      <span>MY Telco Coverage</span>
    </div>
  </div>
  <div class="header-right">
    <button class="locate-btn" id="locateBtn" title="My Location">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<!-- ===== Map ===== -->
<div id="map"></div>

<!-- ===== Layer Control Panel ===== -->
<div class="panel">

  <!-- Maxis -->
  <div class="panel-section">
    <div class="panel-label">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="3" fill="#00b0f0"/></svg>
      Maxis
    </div>
    <div class="layer-toggles">
      <button class="layer-btn" style="--layer-color: var(--maxis-green)" data-telco="maxis" data-gen="2g">
        <span class="dot"></span>2G
      </button>
      <button class="layer-btn active" style="--layer-color: var(--maxis-blue)" data-telco="maxis" data-gen="4g">
        <span class="dot"></span>4G
      </button>
      <button class="layer-btn" style="--layer-color: var(--maxis-pink)" data-telco="maxis" data-gen="5g">
        <span class="dot"></span>5G
      </button>
    </div>
  </div>

  <!-- CelcomDigi -->
  <div class="panel-section">
    <div class="panel-label">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="3" fill="#ed1c24"/></svg>
      CelcomDigi
    </div>
    <div class="layer-toggles">
      <button class="layer-btn" style="--layer-color: var(--celcom-blue)" data-telco="celcomdigi" data-gen="celcom_4g">
        <span class="dot"></span>Celcom 4G
      </button>
      <button class="layer-btn" style="--layer-color: var(--celcom-blue)" data-telco="celcomdigi" data-gen="digi_4g">
        <span class="dot"></span>Digi 4G
      </button>
      <button class="layer-btn" style="--layer-color: var(--digi-yellow)" data-telco="celcomdigi" data-gen="5g">
        <span class="dot"></span>5G
      </button>
    </div>
  </div>

  <!-- Coming Soon -->
  <div class="panel-section">
    <div class="panel-label">Coming Soon</div>
    <div class="coming-soon">
      <div class="coming-soon-badge"><span class="cs-dot" style="background: var(--umobile)"></span>U Mobile</div>
      <div class="coming-soon-badge"><span class="cs-dot" style="background: var(--unifi)"></span>unifi</div>
    </div>
  </div>

  <!-- Opacity -->
  <div class="panel-section">
    <div class="opacity-row">
      <span class="opacity-label">Opacity</span>
      <input type="range" class="opacity-slider" id="opacitySlider" min="10" max="100" value="70">
      <span class="opacity-value" id="opacityValue">70%</span>
    </div>
  </div>
</div>

<!-- ===== Libraries ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ============================================
// allg v1.1 — Malaysia Telco Coverage Map
// Maxis (tiles) + CelcomDigi (KMZ→GeoJSON)
// ============================================

// --- Layer Config ---
const MAXIS_BASE = 'https://maxisnetwork.tuxgeo.com/gwc/service/gmaps';
const CD_BASE = 'https://d3ag2wx36x0htv.cloudfront.net/coverage/v3';

const TELCO_LAYERS = {
  maxis: {
    '2g': {
      type: 'tile',
      url: `${MAXIS_BASE}?SRS=EPSG:900913&layers=maxis:coverage_2g&zoom={z}&x={x}&y={y}&format=image/png8`,
      label: 'Maxis 2G',
      color: '#40c706'
    },
    '4g': {
      type: 'tile',
      url: `${MAXIS_BASE}?SRS=EPSG:900913&layers=maxis:coverage_4g&zoom={z}&x={x}&y={y}&format=image/png8`,
      label: 'Maxis 4G',
      color: '#0060ff'
    },
    '5g': {
      type: 'tile',
      url: `${MAXIS_BASE}?SRS=EPSG:900913&layers=maxis:coverage_5g&zoom={z}&x={x}&y={y}&format=image/png8`,
      label: 'Maxis 5G',
      color: '#ed138b'
    }
  },
  celcomdigi: {
    'celcom_4g': {
      type: 'kmz',
      url: `${CD_BASE}/24100702_Celcom_LTE_coverage_WM_EM_combined.kmz?timestamp=10293824`,
      label: 'Celcom 4G',
      color: '#66A2EA'
    },
    'digi_4g': {
      type: 'kmz',
      url: `${CD_BASE}/24100702_Digi_LTE_coverage_WM_EM_combined.kmz?timestamp=10293824`,
      label: 'Digi 4G',
      color: '#66A2EA'
    },
    '5g': {
      type: 'kmz',
      url: `${CD_BASE}/24100702_5G_DNB_coverage_WM_EM_combined.kmz?timestamp=1771901480`,
      label: '5G (DNB)',
      color: '#FFE000'
    }
  }
};

// --- Map Init ---
const map = L.map('map', {
  center: [4.2105, 101.9758],
  zoom: 7,
  zoomControl: true,
  attributionControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// --- State ---
const activeLayers = {};
const kmzCache = {};
let currentOpacity = 0.7;

function layerKey(telco, gen) {
  return `${telco}-${gen}`;
}

// ============================================
// KMZ → GeoJSON Parser
// ============================================
function parseCoords(text) {
  return text.trim().split(/\s+/).map(p => {
    const c = p.split(',').map(Number);
    return [c[0], c[1]]; // [lng, lat]
  }).filter(c => !isNaN(c[0]) && !isNaN(c[1]));
}

function kmlToGeoJSON(kmlText) {
  const doc = new DOMParser().parseFromString(kmlText, 'text/xml');
  const features = [];

  doc.querySelectorAll('Placemark').forEach(pm => {
    // Collect all polygons (direct or inside MultiGeometry)
    const allPolygons = pm.querySelectorAll('Polygon');
    const rings = [];

    allPolygons.forEach(poly => {
      const outer = poly.querySelector('outerBoundaryIs coordinates');
      if (outer) {
        const coords = parseCoords(outer.textContent);
        if (coords.length > 2) rings.push([coords]);
      }
    });

    if (rings.length === 1) {
      features.push({
        type: 'Feature',
        properties: {},
        geometry: { type: 'Polygon', coordinates: rings[0] }
      });
    } else if (rings.length > 1) {
      features.push({
        type: 'Feature',
        properties: {},
        geometry: { type: 'MultiPolygon', coordinates: rings }
      });
    }
  });

  console.log(`KML parsed: ${features.length} features`);
  return { type: 'FeatureCollection', features };
}

async function loadKMZ(url) {
  if (kmzCache[url]) return kmzCache[url];

  console.log(`Downloading KMZ: ${url}`);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

  const buf = await resp.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);

  // Find .kml inside the zip
  let kmlText = null;
  for (const fname of Object.keys(zip.files)) {
    if (fname.toLowerCase().endsWith('.kml')) {
      kmlText = await zip.files[fname].async('text');
      break;
    }
  }
  if (!kmlText) throw new Error('No KML found in KMZ');

  const geojson = kmlToGeoJSON(kmlText);
  kmzCache[url] = geojson;
  return geojson;
}

// ============================================
// Layer Toggle (tile + KMZ unified)
// ============================================
async function toggleLayer(telco, gen, btn) {
  const key = layerKey(telco, gen);
  const config = TELCO_LAYERS[telco]?.[gen];
  if (!config) return false;

  // Remove if active
  if (activeLayers[key]) {
    map.removeLayer(activeLayers[key]);
    delete activeLayers[key];
    return false;
  }

  // Add tile layer
  if (config.type === 'tile') {
    const layer = L.tileLayer(config.url, {
      opacity: currentOpacity,
      maxZoom: 18,
      minZoom: 1
    });
    layer.addTo(map);
    activeLayers[key] = layer;
    return true;
  }

  // Add KMZ layer
  if (config.type === 'kmz') {
    if (btn) btn.classList.add('loading');
    try {
      const geojson = await loadKMZ(config.url);
      const layer = L.geoJSON(geojson, {
        style: {
          color: config.color,
          fillColor: config.color,
          fillOpacity: currentOpacity * 0.6,
          weight: 0,
          opacity: currentOpacity
        }
      });
      layer.addTo(map);
      activeLayers[key] = layer;
      return true;
    } catch (err) {
      console.error(`Failed to load ${config.label}:`, err);
      alert(`Failed to load ${config.label}: ${err.message}`);
      return false;
    } finally {
      if (btn) btn.classList.remove('loading');
    }
  }

  return false;
}

// ============================================
// UI: Button Handlers
// ============================================
document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (btn.classList.contains('loading')) return;
    const telco = btn.dataset.telco;
    const gen = btn.dataset.gen;
    const isActive = await toggleLayer(telco, gen, btn);
    btn.classList.toggle('active', isActive);
  });
});

// ============================================
// UI: Opacity Slider
// ============================================
const opacitySlider = document.getElementById('opacitySlider');
const opacityVal = document.getElementById('opacityValue');

opacitySlider.addEventListener('input', (e) => {
  currentOpacity = parseInt(e.target.value) / 100;
  opacityVal.textContent = `${e.target.value}%`;

  Object.values(activeLayers).forEach(layer => {
    if (layer.setOpacity) {
      // Tile layer
      layer.setOpacity(currentOpacity);
    } else if (layer.setStyle) {
      // GeoJSON layer
      layer.setStyle({
        fillOpacity: currentOpacity * 0.6,
        opacity: currentOpacity
      });
    }
  });
});

// ============================================
// UI: Geolocation
// ============================================
const locateBtn = document.getElementById('locateBtn');
let locationMarker = null;

locateBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    alert('Geolocation not supported.');
    return;
  }
  locateBtn.classList.add('active');

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], 13);
      if (locationMarker) map.removeLayer(locationMarker);
      locationMarker = L.circleMarker([latitude, longitude], {
        radius: 8, fillColor: '#6366f1', fillOpacity: 1,
        color: '#fff', weight: 2
      }).addTo(map).bindPopup('You are here').openPopup();
      setTimeout(() => locateBtn.classList.remove('active'), 1500);
    },
    (err) => {
      locateBtn.classList.remove('active');
      alert('Location error: ' + err.message);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

// ============================================
// Init
// ============================================
toggleLayer('maxis', '4g', null);

</script>
</body>
</html>
